name: 构建 APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3 python3-pip python3-venv \
            autoconf automake libtool \
            libltdl-dev libffi-dev libssl-dev \
            openjdk-17-jdk \
            zip unzip git \
            libncurses5-dev libncursesw5-dev \
            zlib1g-dev cmake

      - name: 设置 Java 环境
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

      - name: 安装 buildozer
        run: |
          python3 -m pip install --upgrade pip
          pip3 install buildozer cython

      - name: 缓存 Android SDK/NDK
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-v2-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-v2-

      - name: 构建 APK (debug)
        run: |
          buildozer android debug 2>&1

      - name: 上传 APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 测试-apk
          path: bin/*.apk
          retention-days: 30
