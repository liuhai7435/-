name: жһ„е»ә APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: жЈҖеҮәд»Јз Ғ
        uses: actions/checkout@v4

      - name: е®үиЈ…зі»з»ҹдҫқиө–
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3 python3-pip python3-venv \
            autoconf automake libtool libltdl-dev \
            libffi-dev libssl-dev openjdk-17-jdk \
            zip unzip git wget cmake \
            libncurses5-dev libncursesw5-dev zlib1g-dev

      - name: и®ҫзҪ®зҺҜеўғеҸҳйҮҸ
        run: |
          ANDROID_HOME=$HOME/android-sdk
          ANDROID_SDK_ROOT=$HOME/android-sdk
          ANDROID_NDK_HOME=$HOME/android-sdk/ndk/26.3.11579264
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH
          # жҠҠ build-tools еҠ еҲ° PATHпјҲи®© buildozer жүҫеҲ° aidlпјү
          echo "$ANDROID_HOME/build-tools/33.0.2" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

      - name: зј“еӯҳ Android SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ~/android-sdk
          key: android-sdk-v3-ndk26

      - name: е®үиЈ… Android SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools latest
          rm commandlinetools-linux-11076708_latest.zip
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME --licenses
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME \
            "platform-tools" "platforms;android-33" "build-tools;33.0.2" "ndk;26.3.11579264"

      - name: е®үиЈ… buildozer
        run: pip3 install buildozer cython

      - name: зј“еӯҳ buildozer жһ„е»ә
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-v4-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-v4-

      - name: жһ„е»ә APK
        run: |
          # buildozer еқҡжҢҒз”ЁиҮӘеёҰи·Ҝеҫ„пјҢжҠҠйў„иЈ… SDK й“ҫжҺҘиҝҮеҺ»
          mkdir -p ~/.buildozer/android/platform/android-sdk
          ln -sf $ANDROID_HOME/build-tools ~/.buildozer/android/platform/android-sdk/build-tools
          ln -sf $ANDROID_HOME/platforms ~/.buildozer/android/platform/android-sdk/platforms
          ln -sf $ANDROID_HOME/platform-tools ~/.buildozer/android/platform/android-sdk/platform-tools
          ln -sf $ANDROID_NDK_HOME ~/.buildozer/android/platform/android-ndk
          buildozer android debug

      - name: дёҠдј  APK
        uses: actions/upload-artifact@v4
        with:
          name: жөӢиҜ•-apk
          path: bin/*.apk
          retention-days: 30
